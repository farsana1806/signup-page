<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE (IMAGE) -->
  <div class="left">
    <div class="logo">
  <img src="https://cdn.statically.io/gh/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png" alt="Odin Logo">
  <h1>ODIN</h1>
</div>
  </div>

  <!-- RIGHT SIDE (FORM) -->
  <div class="right">

    <div class="text">
      <p>
        This is not a real online service. You know you need something
        like this in your life to help you realize your deepest dreams.
      </p>
      <p>You know you want to.</p>
    </div>

    <div class="form-box">
      <h3>Let's do this!</h3>

      <form>
        <div class="row">
          <div>
            <label>FIRST NAME</label>
            <input type="text" placeholder="Thor">
          </div>

          <div>
            <label>LAST NAME</label>
            <input type="text" placeholder="Odinson">
          </div>
        </div>

        <div class="row">
          <div>
            <label>EMAIL</label>
            <input type="email">
          </div>

          <div>
            <label>PHONE NUMBER</label>
            <input type="tel">
          </div>
        </div>

        <div class="row">
          <div>
            <label>PASSWORD</label>
            <input type="password">
          </div>

          <div>
            <label>CONFIRM PASSWORD</label>
            <input type="password">
          </div>
        </div>
      </form>
    </div>

    <div class="bottom">
      <button>Create Account</button>
      <p>Already have an account? <a href="#">Log in</a></p>
    </div>

  </div>

</div>

</body>
</html>
